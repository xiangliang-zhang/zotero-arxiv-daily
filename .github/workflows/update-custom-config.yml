name: Update CUSTOM_CONFIG

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/update-custom-config.yml

jobs:
  update-custom-config:
    runs-on: ubuntu-latest
    steps:
      - name: Update repository variable
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CONFIG_B64: 
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.request

          value = base64.b64decode(os.environ["CONFIG_B64"]).decode("utf-8")
          api = f"https://api.github.com/repos/{os.environ['REPO']}/actions/variables/CUSTOM_CONFIG"
          token = os.environ["GH_TOKEN"]
          body = json.dumps({"name": "CUSTOM_CONFIG", "value": value}).encode("utf-8")
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "Content-Type": "application/json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          req = urllib.request.Request(api, data=body, headers=headers, method="PATCH")
          with urllib.request.urlopen(req, timeout=60) as resp:
              print("PATCH status:", resp.status)
          for key in ["model:", "language:", "send_empty:", "max_paper_num:"]:
              for line in value.splitlines():
                  if line.strip().startswith(key):
                      print(line.strip())
          PY
